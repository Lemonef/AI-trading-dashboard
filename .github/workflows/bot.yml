name: Bot Commands

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bot:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    steps:
      - name: Handle bot commands
        run: |
          pip install httpx --quiet
          python3 - <<'EOF'
import asyncio, httpx, os
from datetime import datetime, timezone

async def main():
    token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
    if not token:
        return
    url_base = f"https://api.telegram.org/bot{token}"
    async with httpx.AsyncClient(timeout=15) as client:
        # Register /myid command in menu
        await client.post(f"{url_base}/setMyCommands", json={"commands": [
            {"command": "myid", "description": "Get your Chat ID for Setup Alerts"},
        ]})
        # Fetch pending updates
        res = await client.get(f"{url_base}/getUpdates", params={"limit": 50, "timeout": 1})
        if not res.is_success:
            return
        updates = res.json().get("result", [])
        if not updates:
            return
        now = datetime.now(timezone.utc)
        max_id = 0
        for u in updates:
            uid = u.get("update_id", 0)
            if uid > max_id:
                max_id = uid
            msg = u.get("message", {})
            text = (msg.get("text") or "").strip().lower()
            chat_id = msg.get("chat", {}).get("id")
            ts = msg.get("date", 0)
            age = (now - datetime.fromtimestamp(ts, tz=timezone.utc)).total_seconds()
            if chat_id and text.startswith("/myid") and age < 7200:
                name = msg.get("from", {}).get("first_name", "")
                greeting = f"Hi {name}! " if name else ""
                await client.post(f"{url_base}/sendMessage", json={
                    "chat_id": chat_id,
                    "text": (
                        f"🤖 {greeting}Your Telegram Chat ID is:\n\n"
                        f"`{chat_id}`\n\n"
                        "Copy this → open Trading Signal Desk → click **Setup alerts** → paste it in."
                    ),
                    "parse_mode": "Markdown",
                })
        # Acknowledge processed updates
        if max_id:
            await client.get(f"{url_base}/getUpdates", params={"offset": max_id + 1, "limit": 1, "timeout": 0})

asyncio.run(main())
EOF
