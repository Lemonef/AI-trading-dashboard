name: Scheduled Scanner

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduled-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      WATCHLIST: ${{ vars.WATCHLIST || 'BTC/USDT,ETH/USDT,SOL/USDT,BNB/USDT,XRP/USDT,DOGE/USDT,AVAX/USDT,LINK/USDT,AAPL,MSFT,NVDA,TSLA,META,GOOGL,AMZN,AMD,AVGO,QCOM,MU,ARM,PLTR,COIN,SMCI,SPY,QQQ,IWM,DIA,XLE,XLK,XLF,XLV,XLI,XLB,XLU,XLP,XLY,GLD,SLV,USO,ARKK,EWY,EWT,EEM,VGK,GC=F,SI=F,HG=F,PL=F,PA=F,CL=F,BZ=F,NG=F,ZW=F,ZC=F,ZS=F,KC=F,EURUSD=X,GBPUSD=X,USDJPY=X,AUDUSD=X,USDCAD=X,USDCHF=X,NZDUSD=X,USDCNH=X,USDSGD=X,USDINR=X' }}
      EXCHANGE_ID: ${{ vars.EXCHANGE_ID || 'binance' }}
      FALLBACK_EXCHANGE_IDS: ${{ vars.FALLBACK_EXCHANGE_IDS || 'coinbase,kraken' }}
      TIMEFRAME: ${{ vars.TIMEFRAME || '1d' }}
      OHLCV_LIMIT: ${{ vars.OHLCV_LIMIT || '260' }}
      ALLOW_DEMO_DATA: "false"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_DAILY_MODEL: ${{ vars.CLAUDE_DAILY_MODEL || 'claude-3-5-sonnet-latest' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile backend
        working-directory: backend
        run: python -m compileall app

      - name: Show scanner config
        run: |
          echo "WATCHLIST=${WATCHLIST}"
          echo "EXCHANGE_ID=${EXCHANGE_ID}"
          echo "FALLBACK_EXCHANGE_IDS=${FALLBACK_EXCHANGE_IDS}"
          echo "TIMEFRAME=${TIMEFRAME}"
          echo "OHLCV_LIMIT=${OHLCV_LIMIT}"
          if [ -n "${SUPABASE_URL}" ]; then echo "SUPABASE=enabled"; else echo "SUPABASE=disabled"; fi
          if [ -n "${TELEGRAM_BOT_TOKEN}" ]; then echo "TELEGRAM=enabled"; else echo "TELEGRAM=disabled"; fi

      - name: Run scanner
        working-directory: backend
        run: python -m app.cli
