name: Regenerate Summaries

on:
  schedule:
    - cron: "0 3 * * *"   # 10:00 BKK — after morning scanner finishes (~01:30-02:10 UTC)
  workflow_dispatch:

permissions:
  contents: read

# Prevent two summarize runs from overlapping — both would burn Groq TPM simultaneously
concurrency:
  group: regenerate-summaries
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      LUNARCRUSH_API_KEY: ${{ secrets.LUNARCRUSH_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Regenerate summaries
        working-directory: backend
        run: python -m app.cli --summarize
